services:
  # ---------------------------------------------------------------
  # Core traffic agent (headless — train / eval / compare / dumb)
  # ---------------------------------------------------------------
  agent:
    build: .
    environment:
      - MODE=${MODE:-dumb}
      - WANDB_API_KEY=${WANDB_API_KEY:-}
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
      - ./tb_logs:/app/tb_logs
      - ./results:/app/results

  # ---------------------------------------------------------------
  # Visual demo (sumo-gui streamed via noVNC)
  # ---------------------------------------------------------------
  demo:
    build: .
    environment:
      - MODE=demo
    ports:
      - "6080:6080"
      - "8001:8000"
    volumes:
      - ./models:/app/models
    profiles:
      - demo

  # ---------------------------------------------------------------
  # Prometheus (metrics scraping)
  # ---------------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9010:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    restart: unless-stopped

  # ---------------------------------------------------------------
  # Grafana (dashboards)
  # ---------------------------------------------------------------
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/traffic.json
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    restart: unless-stopped

  # ---------------------------------------------------------------
  # TensorBoard (training curves)
  # ---------------------------------------------------------------
  tensorboard:
    image: tensorflow/tensorflow:latest
    ports:
      - "6006:6006"
    volumes:
      - ./tb_logs:/tb_logs:ro
    command: tensorboard --logdir=/tb_logs --host=0.0.0.0 --port=6006
    profiles:
      - monitoring
    restart: unless-stopped
